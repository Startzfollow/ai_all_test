experiment:
  name: llava_lora_docvqa
  description: LLaVA-style LoRA/QLoRA multimodal fine-tuning experiment
  status: configured

hardware:
  expected_gpus: 4
  expected_gpu_memory_gb: 98
  precision: bf16

paths:
  model_path: /mnt/PRO6000_disk/models/Qwen
  data_path: data/processed/llava_cot_1k.jsonl
  image_folder: /mnt/PRO6000_disk/data
  output_dir: outputs/llava_lora_docvqa

training:
  method: lora
  trainer_entry: scripts/train_llava_lora.py
  nproc_per_node: 4
  master_port: 29501
  num_train_epochs: 1
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 0.00002
  weight_decay: 0.0
  warmup_ratio: 0.03
  lr_scheduler_type: cosine
  logging_steps: 10
  save_steps: 500
  save_total_limit: 3
  gradient_checkpointing: true
  deepspeed: configs/zero2.json

lora:
  enable: true
  r: 64
  alpha: 128
  dropout: 0.05

reporting:
  metrics_path: experiments/llava_lora_docvqa/results/metrics.json
  examples_path: experiments/llava_lora_docvqa/results/examples.jsonl
  evidence_dir: experiments/llava_lora_docvqa/evidence
