name: Business Dataset Acceptance

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  business-dataset-acceptance:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install minimal dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pillow pyyaml fastapi uvicorn pydantic pydantic-settings numpy pytest httpx

      - name: Generate field-service demo dataset
        run: |
          python scripts/create_field_service_demo_dataset.py --overwrite

      - name: Run dataset acceptance
        run: |
          PYTHONPATH=. python scripts/run_business_dataset_acceptance.py --with-business-smoke --with-quality-eval
