name: Product Smoke

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  product-smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install minimal dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn pydantic pydantic-settings pyyaml numpy pytest httpx

      - name: Run product smoke acceptance
        run: |
          python scripts/product_smoke_acceptance.py

      - name: Upload smoke reports
        uses: actions/upload-artifact@v4
        with:
          name: product-smoke-report
          path: outputs/smoke/