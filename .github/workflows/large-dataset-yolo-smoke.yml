name: Large Dataset YOLO Smoke

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  dataset-quality-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pillow pyyaml
      - name: Generate small synthetic YOLO dataset
        run: |
          python scripts/create_large_field_service_yolo_dataset.py \
            --output data/ci_field_service_yolo \
            --num-images 32 \
            --image-size 320 \
            --overwrite
      - name: Check dataset quality
        run: |
          python scripts/check_yolo_dataset_quality.py \
            --data data/ci_field_service_yolo/data.yaml
