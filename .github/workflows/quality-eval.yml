name: Quality Evaluation

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  quality-eval:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Run quality evaluator
        run: |
          python scripts/evaluate_quality.py --repo-root . --output-dir outputs/quality --top-k 4

      - name: Upload quality report
        uses: actions/upload-artifact@v4
        with:
          name: product-quality-report
          path: |
            outputs/quality/product_quality_report.json
            outputs/quality/product_quality_report.md
