name: Platform Report

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  platform-report-dry-run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install minimal dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Validate experiment recipes
        run: |
          python scripts/run_experiment.py --config configs/experiments/llava_docvqa_lora_v2.yaml --list-commands
          python scripts/run_experiment.py --config configs/experiments/rag_bge_reranker_v2.yaml --list-commands
          python scripts/run_experiment.py --config configs/experiments/yolo_domain_quality_v2.yaml --list-commands

      - name: Generate platform report without local private assets
        run: |
          python scripts/generate_platform_report.py --repo-root .
