services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: ai_fullstack_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./vector_db/qdrant:/qdrant/storage
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ai_fullstack_backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./:/workspace
      - /mnt/PRO6000_disk:/mnt/PRO6000_disk
    depends_on:
      - qdrant
    profiles: ["backend"]
